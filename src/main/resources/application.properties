# ═══════════════════════════════════════════════════════════════
# BlackRock Retirement Auto-Savings API — Application Configuration
# ═══════════════════════════════════════════════════════════════

# Server
server.port=5477
spring.application.name=blackrock-retirement-api

# Jackson — consistent datetime serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=NON_NULL

# Logging
logging.level.com.blackrock=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} — %msg%n

# Actuator (expose health and info for monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger / SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.display-request-duration=true

# Tomcat thread pool — tune for high concurrency under 10^6 transaction loads
server.tomcat.threads.min-spare=10
server.tomcat.threads.max=200
server.tomcat.accept-count=100

# Request size limits (10MB to handle large transaction batches)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
